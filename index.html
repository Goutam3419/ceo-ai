<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CEO Agent — AI Company OS</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #2a2f3a;
    --text: #e6e8eb;
    --muted: #9aa1ac;
    --accent: #5b8cff;
    --founder-bubble: #5b8cff;
    --agent-bubble: #232733;
    --error: #ff6b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  header h1 {
    font-size: 16px;
    margin: 0;
    font-weight: 600;
  }
  header .sub {
    font-size: 12px;
    color: var(--muted);
  }
  #settings {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  #settings input {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 8px;
    font-size: 12px;
    width: 150px;
  }
  #settings button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 14px;
    line-height: 1.4;
    font-size: 14px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.founder {
    align-self: flex-end;
    background: var(--founder-bubble);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg.agent {
    align-self: flex-start;
    background: var(--agent-bubble);
    border-bottom-left-radius: 4px;
  }
  .msg.system {
    align-self: center;
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-style: italic;
  }
  .msg.error {
    align-self: flex-start;
    background: transparent;
    border: 1px solid var(--error);
    color: var(--error);
  }
  .tool-calls {
    margin-top: 8px;
    font-size: 12px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }
  .tool-calls summary {
    cursor: pointer;
  }
  .tool-calls pre {
    background: #0d0f13;
    padding: 8px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 6px 0 0 0;
  }
  #inputBar {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--panel);
  }
  #messageInput {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    resize: none;
    font-family: inherit;
  }
  #sendBtn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0 20px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
  }
  #sendBtn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .typing {
    align-self: flex-start;
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
  }
</style>
</head>
<body>
  <header>
    <div>
      <h1>CEO Agent</h1>
      <div class="sub">AI Company OS — Founder Chat</div>
    </div>
    <div id="settings">
      <input id="accessToken" type="password" placeholder="Access token (optional)" />
      <button id="clearBtn" type="button">Clear chat</button>
    </div>
  </header>

  <div id="chat"></div>

  <div id="inputBar">
    <textarea id="messageInput" rows="1" placeholder="Type a message to the CEO Agent..."></textarea>
    <button id="sendBtn" type="button">Send</button>
  </div>

  <script>
    const chatEl = document.getElementById("chat");
    const inputEl = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const tokenEl = document.getElementById("accessToken");
    const clearBtn = document.getElementById("clearBtn");

    // Conversation history, kept in the browser only. The backend is
    // stateless per request (see api/ceo-chat.js) — the whole history
    // is sent with every message so the model has context.
    let history = JSON.parse(sessionStorage.getItem("ceo-chat-history") || "[]");
    const savedToken = sessionStorage.getItem("ceo-chat-token");
    if (savedToken) tokenEl.value = savedToken;

    function saveHistory() {
      sessionStorage.setItem("ceo-chat-history", JSON.stringify(history));
    }

    function addBubble(role, text) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.textContent = text;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
      return div;
    }

    function addToolCalls(container, toolCalls) {
      if (!toolCalls || toolCalls.length === 0) return;
      const details = document.createElement("details");
      details.className = "tool-calls";
      const summary = document.createElement("summary");
      summary.textContent = `${toolCalls.length} action${toolCalls.length > 1 ? "s" : ""} taken`;
      details.appendChild(summary);
      const pre = document.createElement("pre");
      pre.textContent = JSON.stringify(toolCalls, null, 2);
      details.appendChild(pre);
      container.appendChild(details);
    }

    // Replay any saved history on load.
    for (const turn of history) {
      if (turn.role === "user" && typeof turn.content === "string") {
        addBubble("founder", turn.content);
      }
    }
    if (history.length === 0) {
      addBubble(
        "system",
        "This chat talks to the real CEO Agent, wired to Task Board, Approval Center, and Review Queue. It can create goals, tasks, and approval requests — it cannot itself push to GitHub or deploy. Those still require a separate, explicit approved execution step."
      );
    }

    async function sendMessage() {
      const message = inputEl.value.trim();
      if (!message) return;

      inputEl.value = "";
      sendBtn.disabled = true;
      addBubble("founder", message);

      const typingEl = document.createElement("div");
      typingEl.className = "typing";
      typingEl.textContent = "CEO Agent is thinking...";
      chatEl.appendChild(typingEl);
      chatEl.scrollTop = chatEl.scrollHeight;

      const headers = { "Content-Type": "application/json" };
      const token = tokenEl.value.trim();
      if (token) {
        headers["Authorization"] = "Bearer " + token;
        sessionStorage.setItem("ceo-chat-token", token);
      }

      try {
        const response = await fetch("/api/ceo-chat", {
          method: "POST",
          headers,
          body: JSON.stringify({ message, history }),
        });
        const data = await response.json();
        typingEl.remove();

        if (!response.ok) {
          addBubble("error", data.error || `Request failed (${response.status})`);
          return;
        }

        const bubble = addBubble("agent", data.reply || "(no reply text)");
        addToolCalls(bubble, data.toolCalls);

        history.push({ role: "user", content: message });
        history.push({ role: "assistant", content: data.reply });
        saveHistory();
      } catch (error) {
        typingEl.remove();
        addBubble("error", "Network error: " + error.message);
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    clearBtn.addEventListener("click", () => {
      history = [];
      sessionStorage.removeItem("ceo-chat-history");
      chatEl.innerHTML = "";
      addBubble("system", "Chat cleared.");
    });
  </script>
</body>
</html>
